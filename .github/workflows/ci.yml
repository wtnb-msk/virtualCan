name: virtualCan PoC CI

on:
  push:
  pull_request:

jobs:
  poc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y can-utils python3-venv python3-dev linux-modules-extra-$(uname -r)

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Build ecu_cpp
        run: g++ -O2 -o targets/ecu_cpp/app targets/ecu_cpp/main.cpp

      - name: Build dogmode
        run: g++ -O2 -pthread -o targets/dogmode/app targets/dogmode/src/main.cpp targets/dogmode/src/state_machine.cpp targets/dogmode/src/bms_ecu.cpp targets/dogmode/src/vcu.cpp

      - name: Setup vcan0
        run: sudo bash scripts/setup_vcan.sh

      - name: Run PoC (ecu_cpp)
        run: sudo bash run_poc.sh targets/ecu_cpp

      - name: Check result (ecu_cpp)
        run: bash scripts/check_result.sh logs/ecu.log targets/ecu_cpp/scenario.yml

      - name: Run PoC (dogmode)
        run: sudo bash run_poc.sh targets/dogmode

      - name: Check result (dogmode)
        run: bash scripts/check_result.sh logs/ecu.log targets/dogmode/scenario.yml

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-logs
          path: logs/
