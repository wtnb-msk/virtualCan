name: ecu_cpp_test
steps:
  # --- 正常系 ---
  - label: "正常フレーム送信（8バイト）"
    template: "123#0102030405060708"
    count: 5
    interval: 0.1

  # --- 異常系 ---
  - label: "異常フレーム送信（全バイト FF、8バイト）"
    template: "123#FFFFFFFFFFFFFFFF"
    count: 3
    interval: 0.5

  # --- 境界値: データ長 ---
  - label: "DLC=1 全バイト FF → ABNORMAL"
    template: "123#FF"
    count: 1
    interval: 0.1

  - label: "DLC=0 データなし → NORMAL"
    template: "123#"
    count: 1
    interval: 0.1

  # --- 境界値: 部分一致 ---
  - label: "先頭1バイトだけ FF → NORMAL"
    template: "123#FF00000000000000"
    count: 1
    interval: 0.1

  - label: "末尾1バイトだけ 00 → NORMAL"
    template: "123#FFFFFFFFFFFFFF00"
    count: 1
    interval: 0.1

  # --- ID フィルタ ---
  - label: "異なる ID（0x456）の異常フレーム → 無視"
    template: "456#FFFFFFFFFFFFFFFF"
    count: 1
    interval: 0.1

  # --- 状態汚染チェック ---
  - label: "異常後に正常フレーム → NORMAL（状態リセット確認）"
    template: "123#0102030405060708"
    count: 3
    interval: 0.1
